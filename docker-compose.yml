# 2026世界杯AI预测引擎 - Docker Compose配置

version: '3.8'

services:
  # 主应用服务
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worldcup-prediction-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - FOOTBALL_API_KEY=${FOOTBALL_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: worldcup-prediction-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    profiles:
      - with-nginx

networks:
  default:
    name: worldcup-network
    driver: bridge